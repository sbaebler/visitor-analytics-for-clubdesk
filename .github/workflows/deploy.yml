name: Deploy to cyon.ch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # FTP-User ftp_stats@zurich-sailing.ch landet direkt in /home/vabavoco/public_html/stats
      # → server-dir ist "/" (FTP-Root = Subdomain-Root)
      - name: Deploy via FTP to cyon
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.CYON_SFTP_HOST }}
          username: ${{ secrets.CYON_SFTP_USER }}
          password: ${{ secrets.CYON_SFTP_PASSWORD }}
          protocol: ftps
          port:     21
          local-dir:  ./
          server-dir: /public_html/stats/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/config/config.php
