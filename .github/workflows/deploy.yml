name: Deploy to cyon.ch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP (lftp)
        env:
          FTP_USER: ftp_stats@zurich-sailing.ch
          FTP_PASSWORD: ${{ secrets.CYON_SFTP_PASSWORD }}
          FTP_HOST: ftp.zurich-sailing.ch
          REMOTE_PATH: /public_html/stats/
        run: |
          sudo apt-get install -y lftp -q
          lftp -u "$FTP_USER,$FTP_PASSWORD" sftp://$FTP_HOST:22 <<EOF
            set sftp:auto-confirm yes
            set net:timeout 30
            set net:max-retries 3
            mirror --reverse --delete \
              --exclude=^\.git/ \
              --exclude=^\.github/ \
              --exclude=config/config\.php \
              . $REMOTE_PATH
            bye
          EOF
