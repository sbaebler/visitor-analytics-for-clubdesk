name: Deploy to cyon.ch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS (lftp)
        env:
          FTP_PASSWORD: ${{ secrets.CYON_FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -c "
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate false
            set net:timeout 15
            set net:max-retries 3
            open ftps://ftp.zurich-sailing.ch
            user ftp_stats@zurich-sailing.ch $FTP_PASSWORD
            mirror --reverse --delete \
              --exclude=^\.git/ \
              --exclude=^\.github/ \
              --exclude=config/config\.php \
              . /
          "
